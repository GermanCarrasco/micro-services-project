version: '3.9'

services:

  postgres-account-db:
    image: postgres:16
    container_name: postgres-account-db
    restart: always
    environment:
      POSTGRES_DB: accountdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices-net


  postgres-auth-db:
    image: postgres:16
    container_name: postgres-auth-db
    restart: always
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - microservices-net


  postgres-transaction-db:
    image: postgres:16
    container_name: postgres-transaction-db
    restart: always
    environment:
      POSTGRES_DB: transaction_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5434:5432"
    volumes:
      - postgres_transaction_data:/var/lib/postgresql/data
    networks:
      - microservices-net


  mysql-customer-db:
    image: mysql:8.0
    container_name: mysql-customer-db
    restart: always
    environment:
      MYSQL_DATABASE: customer_db
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    ports:
      - "3307:3306"
    volumes:
      - mysql_customer_data:/var/lib/mysql
    networks:
      - microservices-net

#  pgadmin:
