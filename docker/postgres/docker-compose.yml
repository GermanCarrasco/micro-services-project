#      - "5050:80"
#    depends_on:
#      - postgres-account-db
#    networks:
#      - microservices-net

networks:
  microservices-net:
    driver: bridge

volumes:
  postgres_data:
  postgres_auth_data:
  postgres_transaction_data:
  mysql_customer_data: